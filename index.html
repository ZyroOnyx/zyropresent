<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zyro Present</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        :root { 
            --bg: #ffffff; --text: #000000; 
            --border: 4px solid #000;
            --shadow: 8px 8px 0px #000;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Typography & Buttons */
        h1, h2, h3 { font-weight: 900; text-transform: uppercase; margin-top: 0; }
        .btn { 
            background: #000; color: #fff; border: 3px solid #000; padding: 12px 20px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 4px 4px 0 #000;
            display: inline-block; text-align: center; text-decoration: none; transition: transform 0.1s;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 #000; }
        .btn.white { background: #fff; color: #000; }
        .btn.red { background: #ff4d4d; color: #fff; }

        /* Screens */
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; }
        .active-screen { display: flex; }

        /* Auth & Modals */
        .center-box { margin: auto; border: var(--border); padding: 30px; box-shadow: var(--shadow); width: 400px; background: #fff; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 3px solid #000; margin-bottom: 15px; font-weight: 800; }
        
        /* Dashboard */
        .header { padding: 20px; border-bottom: var(--border); display: flex; justify-content: space-between; align-items: center; }
        .grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; overflow-y: auto; }
        .project-card { 
            border: var(--border); padding: 20px; box-shadow: var(--shadow); text-align: center; 
            cursor: pointer; background: #fff; display: flex; flex-direction: column; justify-content: space-between; height: 150px;
        }
        .project-card:hover { background: #f0f0f0; }

        /* Role Selector */
        .role-selector { display: flex; gap: 20px; margin: auto; }
        .role-card { border: var(--border); padding: 50px; box-shadow: var(--shadow); cursor: pointer; text-align: center; background: #fff; width: 300px; }
        .role-card:hover { background: #000; color: #fff; }

        /* Controller View */
        .controller-view { display: flex; height: 100%; width: 100%; }
        .ctrl-half { flex: 1; border: 3px solid #000; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; background: #f0f0f0; }
        .ctrl-half:hover { background: #e0e0e0; }
        .ctrl-half img { max-width: 80%; max-height: 80%; border: 4px solid #000; box-shadow: 8px 8px 0 rgba(0,0,0,0.2); }
        .ctrl-label { position: absolute; top: 20px; font-weight: 900; background: #000; color: #fff; padding: 5px 10px; z-index: 10; }
        .no-displayer-warn { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #ff4d4d; color: #fff; padding: 10px; border: 3px solid #000; font-weight: 900; z-index: 100; }

        /* Displayer View */
        .displayer-view { background: #000; display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; position: relative; }
        .displayer-view img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* Fullscreen trick: Hide the exit button when native fullscreen is active */
        #displayer-screen:fullscreen #displayer-exit { display: none; }
        #displayer-screen:-webkit-full-screen #displayer-exit { display: none; }

        .hidden-screen { background: #fff; }
        .hidden-screen img { width: 200px; height: 200px; object-fit: contain; }

        /* Overlay */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen active-screen">
    <div class="center-box">
        <h1>ZYRO PRESENT</h1>

        <input type="text" id="auth-email" placeholder="USERNAME">
        <input type="password" id="auth-pass" placeholder="PASSWORD">

        <button class="btn" style="width: 100%;" onclick="handleLogin()">
            LOGIN
        </button>

        <p style="margin-top:15px; font-weight:700; font-size:0.8rem; opacity:0.7; text-align:center;">
            Contact administrator for account access.
        </p>
    </div>
</div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="screen">
        <div class="header">
            <h2>MY PROJECTS</h2>
            <div>
                <button class="btn white" onclick="document.getElementById('create-modal').style.display='flex'">+ NEW PROJECT</button>
                <button class="btn red" onclick="logout()">LOGOUT</button>
            </div>
        </div>
        <div class="grid" id="project-list"></div>
    </div>

    <!-- CREATE PROJECT MODAL -->
    <div id="create-modal" class="overlay">
        <div class="center-box">
            <h2>CREATE PROJECT</h2>
            <input type="text" id="proj-name" placeholder="PROJECT NAME">
            <label class="btn white" style="width: 100%; margin-bottom: 15px; cursor: pointer;">
                SELECT PNG/JPG SLIDES
                <input type="file" id="proj-files" multiple accept="image/png, image/jpeg" style="display:none;" onchange="document.getElementById('upload-status').innerText = this.files.length + ' slides selected.'">
            </label>
            <p id="upload-status" style="font-weight: 800; font-size: 0.8rem; margin-top: 0;"></p>
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="createProject()">GENERATE PRESENTATION</button>
            <button class="btn red" style="width: 100%;" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <!-- ROLE SELECTOR -->
    <div id="role-screen" class="screen">
        <div class="header">
            <h2 id="selected-proj-name">PROJECT</h2>
            <button class="btn white" onclick="clearProjectSelection()">BACK TO DASHBOARD</button>
        </div>
        <div class="role-selector">
            <div class="role-card" onclick="startController()">
                <h2>CONTROLLER</h2>
                <p style="font-weight:700">Manage slides remotely.</p>
            </div>
            <div class="role-card" onclick="startDisplayer()">
                <h2>DISPLAYER</h2>
                <p style="font-weight:700">Show slides on this screen.</p>
            </div>
        </div>
    </div>

    <!-- CONTROLLER SCREEN -->
    <div id="controller-screen" class="screen">
        <div class="header">
            <h2>CONTROLLER PAD</h2>
            <button class="btn red" onclick="exitSession()">END SESSION</button>
        </div>
        <div class="controller-view">
            <div id="no-displayer-alert" class="no-displayer-warn">CONNECT A DISPLAYER</div>
            <div class="ctrl-half" onclick="changeSlide(-1)">
                <div class="ctrl-label">PREVIOUS</div>
                <img id="ctrl-prev-img" src="" alt="No Previous Slide">
            </div>
            <div class="ctrl-half" onclick="changeSlide(1)">
                <div class="ctrl-label">NEXT</div>
                <img id="ctrl-next-img" src="" alt="End of Presentation">
            </div>
        </div>
    </div>

    <!-- DISPLAYER SCREEN -->
    <div id="displayer-screen" class="screen displayer-view">
        <button id="displayer-exit" class="btn red" onclick="exitSession()" style="position:absolute; top:20px; right:20px; z-index:1000;">EXIT / BACK</button>
        <img id="display-img" src="">
        <div id="display-hide" style="display:none; flex-direction:column; align-items:center;">
            <img src="icon.png" alt="ZYRO ICON">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
       import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    signOut,
    setPersistence,
    browserSessionPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // !!! INSERT YOUR FIREBASE CONFIG HERE !!!
const firebaseConfig = {
  apiKey: "AIzaSyDhi2AeMlCzQxdgL8bIAorNdJEbknbFfdM",
  authDomain: "zyropresent.firebaseapp.com",
  databaseURL: "https://zyropresent-default-rtdb.firebaseio.com",
  projectId: "zyropresent",
  storageBucket: "zyropresent.firebasestorage.app",
  messagingSenderId: "33731082808",
  appId: "1:33731082808:web:f22e14a78604ff8447c4cd",
  measurementId: "G-DL6PCRTW80"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let activeProject = null;
        let activeRole = null;
        let unsubscribeProject = null;
        let isHidden = false;

        // --- AUTH LOGIC ---
      // --- LOGIN ONLY AUTH SYSTEM ---
window.handleLogin = async () => {
    let email = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value;

    if (!email || !pass) {
        return alert("Fill in all fields.");
    }

    // Allows simple usernames
    if (!email.includes('@')) {
        email = email + "@zyropresent.com";
    }

    try {
        // Session ONLY lasts while browser tab is open
        // Closing browser logs them out automatically
        await setPersistence(auth, browserSessionPersistence);

        await signInWithEmailAndPassword(auth, email, pass);

    } catch (e) {
        alert("Invalid account or password.");
    }
};

window.logout = async () => {
    await signOut(auth);

    // Extra protection
    sessionStorage.clear();
    localStorage.removeItem('firebase:authUser');

    location.reload();
};

onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        showScreen('dashboard');
        loadProjects();
    } else {
        currentUser = null;

        // Clears all visible auth fields
        document.getElementById('auth-email').value = '';
        document.getElementById('auth-pass').value = '';

        showScreen('auth-screen');
    }
});

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        // --- DASHBOARD & PROJECTS ---
        function loadProjects() {
            const q = query(collection(db, "projects"), where("owner", "==", currentUser.uid));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('project-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    const card = document.createElement('div');
                    card.className = 'project-card';
                    card.innerHTML = `
                        <h3>${data.name}</h3>
                        <p style="font-weight:700">${data.slides.length} Slides</p>
                        <button class="btn red" style="font-size:0.7rem; padding:5px;" onclick="event.stopPropagation(); deleteProject('${d.id}')">DELETE</button>
                    `;
                    card.onclick = () => selectProject(d.id, data);
                    list.appendChild(card);
                });
            });
        }

        // --- COMPRESSOR LOGIC (No external APIs needed) ---
        function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        // Compress and cap at 1080p width to fit in Firestore safely
                        const MAX_WIDTH = 1920;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        // Convert to lightweight JPG string
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
            });
        }

        window.createProject = async () => {
            const name = document.getElementById('proj-name').value;
            const files = document.getElementById('proj-files').files;
            const status = document.getElementById('upload-status');
            
            if (!name || files.length === 0) return alert("Add a name and at least one image.");
            
            let uploadedUrls = [];
            
            for (let i = 0; i < files.length; i++) {
                status.innerText = `PROCESSING SLIDE ${i + 1} OF ${files.length}...`;
                const base64Data = await processImage(files[i]);
                uploadedUrls.push(base64Data);
            }

            status.innerText = "SAVING TO DATABASE...";

            await addDoc(collection(db, "projects"), {
                name: name,
                owner: currentUser.uid,
                slides: uploadedUrls,
                currentSlide: 0,
                displayerActive: false
            });

            closeModal();
        };

        window.closeModal = () => {
            document.getElementById('create-modal').style.display = 'none';
            document.getElementById('upload-status').innerText = "";
            document.getElementById('proj-name').value = "";
            document.getElementById('proj-files').value = "";
        };

        window.deleteProject = async (id) => {
            if (confirm("Permanently wipe this project?")) await deleteDoc(doc(db, "projects", id));
        };

        function selectProject(id, data) {
            activeProject = { id, ...data };
            document.getElementById('selected-proj-name').innerText = data.name;
            showScreen('role-screen');
        }

        window.clearProjectSelection = () => {
            activeProject = null;
            showScreen('dashboard');
        };

        // --- SESSION LOGIC ---
        window.startController = async () => {
            activeRole = 'controller';
            showScreen('controller-screen');
            listenToSession();
        };

        window.startDisplayer = async () => {
            activeRole = 'displayer';
            showScreen('displayer-screen');
            await updateDoc(doc(db, "projects", activeProject.id), { displayerActive: true });
            listenToSession();
            setupDisplayerHotkeys();
        };

        window.exitSession = async () => {
            if (unsubscribeProject) unsubscribeProject();
            if (activeRole === 'displayer' && activeProject) {
                await updateDoc(doc(db, "projects", activeProject.id), { displayerActive: false });
                if (document.fullscreenElement) document.exitFullscreen();
            }
            activeRole = null;
            showScreen('role-screen'); // Send back to the role picker instead of full dashboard
        };

        function listenToSession() {
            unsubscribeProject = onSnapshot(doc(db, "projects", activeProject.id), (docSnap) => {
                if (!docSnap.exists()) return exitSession();
                const data = docSnap.data();
                activeProject = { id: docSnap.id, ...data };

                if (activeRole === 'controller') {
                    document.getElementById('no-displayer-alert').style.display = data.displayerActive ? 'none' : 'block';
                    document.getElementById('ctrl-prev-img').src = data.slides[data.currentSlide] || '';
                    document.getElementById('ctrl-next-img').src = data.slides[data.currentSlide + 1] || '';
                } 
                else if (activeRole === 'displayer') {
                    document.getElementById('display-img').src = data.slides[data.currentSlide] || '';
                }
            });
        }

        // --- CONTROLS ---
        window.changeSlide = async (dir) => {
            let newSlide = activeProject.currentSlide + dir;
            if (newSlide >= 0 && newSlide < activeProject.slides.length) {
                await updateDoc(doc(db, "projects", activeProject.id), { currentSlide: newSlide });
            }
        };

        function setupDisplayerHotkeys() {
            // Remove previous event listener to avoid duplicate triggers if re-entering
            window.onkeydown = (e) => {
                if (activeRole !== 'displayer') return;
                
                if (e.key === 'ArrowRight') changeSlide(1);
                if (e.key === 'ArrowLeft') changeSlide(-1);
                
                if (e.key.toLowerCase() === 'h') {
                    if (!document.fullscreenElement) document.getElementById('displayer-screen').requestFullscreen();
                    else document.exitFullscreen();
                }

                if (e.key.toLowerCase() === 't') {
                    isHidden = !isHidden;
                    const view = document.getElementById('displayer-screen');
                    const img = document.getElementById('display-img');
                    const hideState = document.getElementById('display-hide');
                    
                    if (isHidden) {
                        view.classList.add('hidden-screen');
                        img.style.display = 'none';
                        hideState.style.display = 'flex';
                    } else {
                        view.classList.remove('hidden-screen');
                        img.style.display = 'block';
                        hideState.style.display = 'none';
                    }
                }
            };
        }
        // AUTO LOGOUT WHEN TAB CLOSES
window.addEventListener('beforeunload', async () => {
    try {
        await signOut(auth);
    } catch {}
});
    </script>
</body>
</html>
